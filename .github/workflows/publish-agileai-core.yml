name: Publish AgileAI.Core

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/publish-agileai-core.yml'
      - 'src/AgileAI.Core/**'
      - 'src/AgileAI.Abstractions/**'
      - 'src/AgileAI.Core/PACKAGE_README.md'
      - 'LICENSE'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Detect AgileAI.Core version change
        id: version_check
        shell: bash
        run: |
          set -euo pipefail

          csproj="src/AgileAI.Core/AgileAI.Core.csproj"
          current_version="$(grep -oPm1 '(?<=<Version>)[^<]+' "$csproj" || true)"

          if [[ -z "$current_version" ]]; then
            echo "AgileAI.Core.csproj is missing a <Version> element." >&2
            exit 1
          fi

          previous_sha="${{ github.event.before }}"
          previous_version=""

          if [[ -n "$previous_sha" && "$previous_sha" != "0000000000000000000000000000000000000000" ]]; then
            previous_version="$(git show "${previous_sha}:${csproj}" 2>/dev/null | grep -oPm1 '(?<=<Version>)[^<]+' || true)"
          fi

          echo "current_version=$current_version" >> "$GITHUB_OUTPUT"
          echo "previous_version=$previous_version" >> "$GITHUB_OUTPUT"

          if [[ "$current_version" == "$previous_version" ]]; then
            echo "version_changed=false" >> "$GITHUB_OUTPUT"
            echo "AgileAI.Core version unchanged ($current_version); skipping publish."
          else
            echo "version_changed=true" >> "$GITHUB_OUTPUT"
            echo "AgileAI.Core version changed from '${previous_version:-<none>}' to '$current_version'."
          fi

      - name: Check if version already exists on NuGet
        id: nuget_check
        if: steps.version_check.outputs.version_changed == 'true'
        shell: bash
        run: |
          set -euo pipefail

          package_id="AgileAI.Core"
          package_id_lower="$(printf '%s' "$package_id" | tr '[:upper:]' '[:lower:]')"
          version="${{ steps.version_check.outputs.current_version }}"
          metadata_url="https://api.nuget.org/v3/registration5-gz-semver2/${package_id_lower}/index.json"

          if curl --fail --silent --location "$metadata_url" | grep -q '"version"[[:space:]]*:[[:space:]]*"'"$version"'"'; then
            echo "version_exists=true" >> "$GITHUB_OUTPUT"
            echo "$package_id $version already exists on NuGet; skipping publish."
          else
            echo "version_exists=false" >> "$GITHUB_OUTPUT"
            echo "$package_id $version not found on NuGet; continuing publish."
          fi

      - name: Restore dependencies
        if: steps.version_check.outputs.version_changed == 'true' && steps.nuget_check.outputs.version_exists != 'true'
        run: dotnet restore "src/AgileAI.Core/AgileAI.Core.csproj"

      - name: Run AgileAI.Core pack validation
        if: steps.version_check.outputs.version_changed == 'true' && steps.nuget_check.outputs.version_exists != 'true'
        run: dotnet pack "src/AgileAI.Core/AgileAI.Core.csproj" -c Release -p:PackageVersion="${{ steps.version_check.outputs.current_version }}" -o "${{ github.workspace }}/artifacts/nuget"

      - name: Publish AgileAI.Core to NuGet
        if: steps.version_check.outputs.version_changed == 'true' && steps.nuget_check.outputs.version_exists != 'true'
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          dotnet nuget push "${{ github.workspace }}/artifacts/nuget/AgileAI.Core.${{ steps.version_check.outputs.current_version }}.nupkg" \
            --source "https://api.nuget.org/v3/index.json" \
            --api-key "$NUGET_API_KEY" \
            --skip-duplicate
